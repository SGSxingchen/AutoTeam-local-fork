name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-syntax:
    name: Backend syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile Python sources
        run: |
          python - <<'PY'
          import py_compile
          import subprocess
          import sys

          files = subprocess.check_output(
              ["git", "ls-files", "*.py"],
              text=True,
          ).splitlines()

          failed = []
          for path in files:
              try:
                  py_compile.compile(path, doraise=True)
              except Exception as exc:
                  failed.append((path, exc))

          if failed:
              for path, exc in failed:
                  print(f"{path}: {exc}")
              sys.exit(1)

          print(f"Compiled {len(files)} Python files successfully.")
          PY

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
